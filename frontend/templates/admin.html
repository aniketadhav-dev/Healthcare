<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – MediBook</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container">
    <div class="page-header">
      <h1>Admin Panel</h1>
      <p>Manage users, doctors, and the platform.</p>
    </div>

    <div id="alertBox"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('users', this)">All Users</button>
      <button class="tab-btn" onclick="showTab('doctors', this)">Doctors</button>
    </div>

    <!-- Users Tab -->
    <div id="tab-users">
      <div class="card">
        <div class="section-header">
          <h2>Registered Users</h2>
        </div>
        <div id="usersTable" class="table-wrapper">
          <div class="loading-overlay"><span class="spinner dark"></span> Loading...</div>
        </div>
      </div>
    </div>

    <!-- Doctors Tab -->
    <div id="tab-doctors" style="display:none">
      <div class="card">
        <div class="section-header">
          <h2>Doctor Profiles</h2>
          <button class="btn btn-primary btn-sm" onclick="UI.openModal('addDoctorModal')">+ Add Doctor</button>
        </div>
        <div id="doctorsTable" class="table-wrapper">
          <div class="loading-overlay"><span class="spinner dark"></span> Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Doctor Modal -->
  <div class="modal-overlay" id="addDoctorModal">
    <div class="modal" style="max-width:560px">
      <div class="modal-header">
        <h2>Add New Doctor</h2>
        <button class="modal-close" onclick="UI.closeModal('addDoctorModal')">✕</button>
      </div>
      <div id="addDoctorAlert"></div>
      <form id="addDoctorForm">
        <p style="font-size:0.85rem;color:var(--gray-500);margin-bottom:1rem;">First register a user, then create a doctor profile. The user's role will be updated to "doctor".</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group" style="grid-column:1/-1">
            <label>Step 1: Register the doctor as a user</label>
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="doc_name" class="form-control" placeholder="Dr. Full Name" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="doc_email" class="form-control" placeholder="doctor@email.com" required>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="doc_phone" class="form-control" placeholder="Phone">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="doc_password" class="form-control" placeholder="Min 6 chars" required>
          </div>

          <div class="form-group" style="grid-column:1/-1">
            <label>Step 2: Doctor Profile Details</label>
          </div>
          <div class="form-group">
            <label>Specialization</label>
            <input type="text" id="doc_spec" class="form-control" placeholder="e.g. Cardiologist" required>
          </div>
          <div class="form-group">
            <label>Qualification</label>
            <input type="text" id="doc_qual" class="form-control" placeholder="e.g. MBBS, MD">
          </div>
          <div class="form-group">
            <label>Experience (years)</label>
            <input type="number" id="doc_exp" class="form-control" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>Consultation Fee (₹)</label>
            <input type="number" id="doc_fee" class="form-control" placeholder="500" min="0">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label>Bio</label>
            <textarea id="doc_bio" class="form-control" placeholder="Doctor's bio and expertise..."></textarea>
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="button" class="btn btn-outline" style="flex:1" onclick="UI.closeModal('addDoctorModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex:1" id="addDoctorBtn">Add Doctor</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    Auth.requireAuth('/login.html');
    Auth.requireRole(['admin'], '/dashboard.html');

    let allUsers = [];
    let allDoctors = [];

    function showTab(tab, btn) {
      document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-users').style.display = tab === 'users' ? '' : 'none';
      document.getElementById('tab-doctors').style.display = tab === 'doctors' ? '' : 'none';
    }

    async function loadUsers() {
      try {
        allUsers = await API.get('/users/');
        renderUsersTable();
      } catch (err) {
        document.getElementById('usersTable').innerHTML = `<div class="empty-state"><h3>${err.message}</h3></div>`;
      }
    }

    async function loadDoctors() {
      try {
        allDoctors = await API.get('/doctors/');
        renderDoctorsTable();
      } catch (err) {
        document.getElementById('doctorsTable').innerHTML = `<div class="empty-state"><h3>${err.message}</h3></div>`;
      }
    }

    function renderUsersTable() {
      const container = document.getElementById('usersTable');
      if (allUsers.length === 0) {
        container.innerHTML = '<div class="empty-state"><h3>No users found</h3></div>';
        return;
      }
      container.innerHTML = `<table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${allUsers.map(u => `<tr>
            <td style="color:var(--gray-500)">#${u.id}</td>
            <td style="font-weight:500">${u.full_name}</td>
            <td style="color:var(--gray-500)">${u.email}</td>
            <td><span class="role-badge ${u.role}">${u.role}</span></td>
            <td>${u.phone || '—'}</td>
            <td><span class="status-badge ${u.is_active ? 'status-confirmed' : 'status-cancelled'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>
              ${u.is_active ? `<button class="btn btn-danger btn-sm" onclick="deactivateUser(${u.id})">Deactivate</button>` : '<span style="color:var(--gray-500);font-size:0.85rem">Inactive</span>'}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    function renderDoctorsTable() {
      const container = document.getElementById('doctorsTable');
      if (allDoctors.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">👨‍⚕️</div><h3>No doctors yet</h3><p>Click "Add Doctor" to add one.</p></div>';
        return;
      }
      container.innerHTML = `<table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Qualification</th>
            <th>Experience</th>
            <th>Fee</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${allDoctors.map(d => `<tr>
            <td style="font-weight:500">${d.user.full_name}</td>
            <td>${d.specialization}</td>
            <td style="color:var(--gray-500)">${d.qualification || '—'}</td>
            <td>${d.experience_years}y</td>
            <td>₹${d.consultation_fee}</td>
            <td><span class="status-badge ${d.is_active ? 'status-confirmed' : 'status-cancelled'}">${d.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>
              ${d.is_active ? `<button class="btn btn-danger btn-sm" onclick="deactivateDoctor(${d.id})">Remove</button>` : '<span style="color:var(--gray-500);font-size:0.85rem">Inactive</span>'}
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    async function deactivateUser(id) {
      if (!confirm('Deactivate this user? They will not be able to log in.')) return;
      try {
        await API.delete(`/users/${id}`);
        UI.showAlert(document.getElementById('alertBox'), 'User deactivated.', 'success');
        loadUsers();
      } catch (err) {
        UI.showAlert(document.getElementById('alertBox'), err.message, 'error');
      }
    }

    async function deactivateDoctor(id) {
      if (!confirm('Remove this doctor from the platform?')) return;
      try {
        await API.delete(`/doctors/${id}`);
        UI.showAlert(document.getElementById('alertBox'), 'Doctor removed.', 'success');
        loadDoctors();
      } catch (err) {
        UI.showAlert(document.getElementById('alertBox'), err.message, 'error');
      }
    }

    // Add Doctor Form: register user then create doctor profile
    document.getElementById('addDoctorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('addDoctorBtn');
      const alertEl = document.getElementById('addDoctorAlert');
      UI.setLoading(btn, true);

      try {
        // Step 1: Register the user with doctor role
        const userRes = await API.post('/auth/register', {
          full_name: document.getElementById('doc_name').value.trim(),
          email: document.getElementById('doc_email').value.trim(),
          phone: document.getElementById('doc_phone').value.trim() || null,
          password: document.getElementById('doc_password').value,
          role: 'doctor',
        }, false);

        // Step 2: Create doctor profile (use admin token)
        await API.post('/doctors/', {
          user_id: userRes.user_id,
          specialization: document.getElementById('doc_spec').value.trim(),
          qualification: document.getElementById('doc_qual').value.trim() || null,
          experience_years: parseInt(document.getElementById('doc_exp').value) || 0,
          consultation_fee: parseInt(document.getElementById('doc_fee').value) || 0,
          bio: document.getElementById('doc_bio').value.trim() || null,
        });

        UI.closeModal('addDoctorModal');
        UI.showAlert(document.getElementById('alertBox'), 'Doctor added successfully!', 'success');
        document.getElementById('addDoctorForm').reset();
        loadDoctors();
        loadUsers();
      } catch (err) {
        UI.showAlert(alertEl, err.message, 'error');
        UI.setLoading(btn, false);
      }
    });

    document.getElementById('addDoctorModal').addEventListener('click', (e) => {
      if (e.target.id === 'addDoctorModal') UI.closeModal('addDoctorModal');
    });

    loadUsers();
    loadDoctors();
  </script>
</body>
</html>
